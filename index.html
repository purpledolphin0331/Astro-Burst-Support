<!DOCTYPE html>
<html>
<head>
<title>Astro Burst Support</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
    line-height: 1.6;
    background:
        linear-gradient(to right, rgba(10,10,24,0.88) 0%, rgba(10,10,24,0.66) 42%, rgba(10,10,24,0.12) 78%),
        url('background1.png');
    background-size: cover;
    background-position: right center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    color: white;
    font-weight: 600;
}
h1 {
font-size: 32px;
font-weight: 800;
margin-bottom: 10px;
}

h2 {
margin-top: 30px;
font-size: 22px;
font-weight: 700;
}

p {
font-size: 16px;
}

a {
color: #ffffff;
font-weight: 800;
}

.card {
background: rgba(0, 0, 0, 0.38);
border: 1px solid rgba(255, 255, 255, 0.18);
border-radius: 18px;
padding: 22px;
backdrop-filter: blur(6px);
}
</head>
<body>
<div class="card">
    <h1>Astro Burst Support</h1>
<p>
    Thanks for playing Astro Burst. If you need help, have feedback, or want to report an issue,
    please contact support by email.
</p>

<h2>Contact</h2>
<p>
    Email: <a href="mailto:astroburst.support@gmail.com">astroburst.support@gmail.com</a>
</p>

<h2>Support Information</h2>
<p>
    When contacting support, please include your device type, operating system version, and a short
    description of the issue you are experiencing.
</p>

<h2>Privacy</h2>
<p>
    You can review the Astro Burst Privacy Policy on the privacy page for this app.
</p>
    </div>
</body>
</html>

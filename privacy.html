<h1>Astro Burst – Privacy Policy</h1>
<h2>Overview</h2>
<p>Astro Burst respects your privacy. The app is designed to function without collecting, storing, selling, or sharing personal data.</p>
<h2>Camera Usage</h2>
<p>Astro Burst uses your device’s camera for real-time hand tracking gameplay. Camera data is processed live on your device and is not recorded, stored, or transmitted by Astro Burst.</p>
<h2>Microphone Usage</h2>
<p>Astro Burst may use your device’s microphone for real-time audio-reactive gameplay effects. Microphone input is processed live on your device and is not recorded, stored, or transmitted by Astro Burst.</p>
<h2>Data Collection</h2>
<p>Astro Burst does not collect, store, sell, or share personal information.</p>
<h2>Third-Party Services</h2>
<p>Astro Burst does not use third-party analytics, tracking, or advertising services.</p>
<h2>Children’s Privacy</h2>
<p>Astro Burst does not knowingly collect personal information from children or any other users.</p>
<h2>Contact</h2>
<p>If you have questions about this Privacy Policy, contact: <a href="mailto:astroburst.support@gmail.com">astroburst.support@gmail.com</a></p>
</div>
